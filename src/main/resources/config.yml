# NewsFlash 設定

translation:
  # プラグインが生成する表示文の言語です。
  # ja, en, zh_CN, zh_TW, ko, de, fr, es, pt_BR, ru を指定できます。
  # ja/en 以外は翻訳ファイルのみ同梱し、未翻訳キーは英語にフォールバックします。
  # RSSや外務省データなど、配信元から取得した記事本文は原文のまま表示します。
  language: "ja"

  # /newsflash language default <language> で、この値をゲーム内から変更できます。
  # /newsflash language personal <language> はプレイヤーごとのコマンド応答言語を変更します。
  # 個人言語は plugins/NewsFlash/player-languages.yml に保存されます。
  # 速報通知本文はサーバーのデフォルト言語で生成されます。

mofa:
  # 日本固有寄りの情報ソースです。
  # 外務省が日本人向けに公開している海外安全情報を利用します。
  # 海外サーバーでも利用できますが、内容は主に日本人・日本語利用者向けです。
  # 外務省 海外安全情報オープンデータの取得を有効にします。
  enabled: true

  # サーバー起動後、初回の自動取得まで待つ秒数です。
  # 起動直後にプレイヤーがまだ参加していない場合の見逃しを防ぎます。
  initial-delay-seconds: 60

  # 自動取得の間隔です。外務省データは概ね5分間隔で更新されます。
  poll-interval-minutes: 5

  # 外務省「新着情報」軽量XMLのURLです。通常は変更不要です。
  url: "https://www.ezairyu.mofa.go.jp/opendata/area/newarrivalL.xml"

  # 外部通信のタイムアウト秒数です。
  timeout-seconds: 15

  # 初回起動時に、既にXML内に存在する古いニュースを一気に流さないようにします。
  # true の場合、初回取得分は既読登録のみ行い、次回以降の新着だけ通知します。
  suppress-initial-broadcast: true

  # 1回の取得でチャットに流す最大件数です。
  max-broadcast-per-poll: 5

  # 配信済みIDを保持する最大件数です。
  # plugins/NewsFlash/mofa-seen.txt が無制限に増えるのを防ぎます。
  seen-history-limit: 1000

  filter:
    # 外務省 海外安全情報向けの通知キーワードフィルタを有効にします。
    # P2P地震情報には適用されません。
    # true の場合、下の keywords に一致したニュースだけ通知します。
    # false の場合、外務省ニュースを全件通知します。
    enabled: true

    # 通知対象にするキーワードです。
    # 判定対象は title + lead + type です。
    keywords:
      - "ミサイル"
      - "攻撃"
      - "空爆"
      - "戦闘"
      - "爆発"
      - "感染"
      - "アウトブレイク"
      - "暗殺"
      - "地震"
      - "津波"
      - "戦争"

p2pquake:
  # 日本固有寄りの情報ソースです。
  # 気象庁由来の日本国内向け地震・津波・緊急地震速報を扱います。
  # 震度表記や都道府県フィルターも日本向けの概念です。
  # P2P地震情報 WebSocket API の取得を有効にします。
  enabled: true

  # P2P地震情報のリアルタイム配信URLです。通常は変更不要です。
  websocket-url: "wss://api.p2pquake.net/v2/ws"

  # WebSocket切断時に再接続まで待つ秒数です。
  reconnect-delay-seconds: 10

  # 重複配信を防ぐため、受信済みIDを保持する最大件数です。
  seen-history-limit: 1000

  earthquake:
    # 気象庁の地震情報をチャットへ通知します。
    enabled: true

    # 通知する最小震度です。
    # 40=震度4, 45=震度5弱, 50=震度5強, 55=震度6弱, 60=震度6強, 70=震度7
    min-scale: 40

    # 通知対象を特定の都道府県に絞る場合に使います。
    # enabled: false の場合は全国を対象にします。
    target-prefectures:
      enabled: false
      list:
        # - "東京都"
        # - "神奈川県"

    # 最大震度不明の地震情報も通知するかどうかです。
    include-unknown-scale: false

  tsunami:
    # 津波注意報・津波警報・大津波警報をチャットへ通知します。
    enabled: true

  eew:
    # 緊急地震速報（警報）をチャットへ通知します。
    enabled: true

    # テスト配信も通知するかどうかです。
    include-tests: false

rss:
  # 汎用の情報ソースです。
  # 日本固有ではありません。任意のRSS/Atom URLを設定できます。
  # 任意のRSS/Atomフィードを取得します。
  # 配信元ごとに利用規約が異なるため、デフォルトでは無効です。
  enabled: false

  # サーバー起動後、初回の自動取得まで待つ秒数です。
  initial-delay-seconds: 60

  # RSS/Atomフィードの取得間隔です。
  poll-interval-minutes: 10

  # 外部通信のタイムアウト秒数です。
  timeout-seconds: 15

  # 1回の取得でチャットに流す最大件数です。
  max-broadcast-per-poll: 5

  # 配信済みIDを保持する最大件数です。
  # plugins/NewsFlash/rss-seen.txt が無制限に増えるのを防ぎます。
  seen-history-limit: 1000

  feeds:
    # RSS/Atomフィードの一覧です。
    # 配信元の利用規約を確認したうえで、各自でURLを設定してください。
    #
    # id:
    #   フィードを識別するためのIDです。英数字・ハイフン・アンダースコア推奨です。
    #   既読管理にも使われるため、運用開始後はなるべく変更しないでください。
    #
    # name:
    #   チャットに表示する配信元名です。
    #
    # url:
    #   RSSまたはAtomフィードのURLです。
    #
    # enabled:
    #   このフィードを取得するかどうかです。
    #
    # filter.enabled:
    #   false の場合は新着記事を全件通知します。
    #   true の場合は keywords に一致した記事だけ通知します。
    #
    # keywords:
    #   filter.enabled が true の場合に使う通知対象キーワードです。
    #   判定対象は title + description/summary です。
    # - id: "example"
    #   name: "Example News"
    #   url: "https://example.com/rss.xml"
    #   enabled: true
    #   filter:
    #     enabled: false
    #     keywords:
    #       - "地震"
    #       - "警報"


broadcast:
  # チャット先頭に表示する接頭辞です。MiniMessage形式が使えます。
  prefix: "<red><bold>[NewsFlash]</bold></red>"

  # チャットに流す本文フォーマットです。MiniMessage形式が使えます。
  # 使用可能な置換: {prefix}, {source}, {type}, {title}, {lead}, {keyword}, {date}, {url}
  format: "{prefix} <gold>{source}</gold> <yellow>{title}</yellow> <gray>({date})</gray> <aqua><click:open_url:'{url}'>{url}</click></aqua>"

  # 通知内容をサーバーコンソールにも出力します。
  console: true
