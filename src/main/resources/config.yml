# NewsFlash configuration

# NewsFlash 設定

translation:
  # Language used for text generated by the plugin.
  # Available values: ja, en, zh_CN, zh_TW, ko, de, fr, es, pt_BR, ru.
  # Languages other than ja/en are included as translation files; missing keys fall back to English.
  # Article bodies from RSS, MOFA, and other sources are displayed as provided by the source.

  # プラグインが生成する表示文の言語です。
  # ja, en, zh_CN, zh_TW, ko, de, fr, es, pt_BR, ru を指定できます。
  # ja/en 以外は翻訳ファイルのみ同梱し、未翻訳キーは英語にフォールバックします。
  # RSSや外務省データなど、配信元から取得した記事本文は原文のまま表示します。
  language: "ja"

  # /newsflash language default <language> can change this value in game.
  # /newsflash language personal <language> changes command response language per player.
  # Personal language settings are stored in plugins/NewsFlash/player-languages.yml.
  # Alert notification text is generated using the server default language.

  # /newsflash language default <language> で、この値をゲーム内から変更できます。
  # /newsflash language personal <language> はプレイヤーごとのコマンド応答言語を変更します。
  # 個人言語は plugins/NewsFlash/player-languages.yml に保存されます。
  # 速報通知本文はサーバーのデフォルト言語で生成されます。

storage:
  # Storage backend for per-player personal settings.
  # yaml: stores data in plugins/NewsFlash/player-languages.yml. Default for small to medium servers.
  # sqlite: stores data in plugins/NewsFlash/newsflash.db. Useful if more personal settings are added later.

  # プレイヤーごとの個人設定の保存方式です。
  # yaml: plugins/NewsFlash/player-languages.yml に保存します。小〜中規模サーバー向けの既定値です。
  # sqlite: plugins/NewsFlash/newsflash.db に保存します。将来、個人設定が増えた場合に向いています。
  type: "yaml"

mofa:
  # Japan-focused data source.
  # Uses MOFA overseas safety information published mainly for Japanese users.
  # It can be used on overseas servers, but the content is mainly for Japanese/Japanese-speaking users.
  # Enables fetching MOFA Overseas Safety open data.

  # 日本固有寄りの情報ソースです。
  # 外務省が日本人向けに公開している海外安全情報を利用します。
  # 海外サーバーでも利用できますが、内容は主に日本人・日本語利用者向けです。
  # 外務省 海外安全情報オープンデータの取得を有効にします。
  enabled: true

  # Seconds to wait after server startup before the first automatic fetch.
  # Helps avoid missing startup notifications before players join.

  # サーバー起動後、初回の自動取得まで待つ秒数です。
  # 起動直後にプレイヤーがまだ参加していない場合の見逃しを防ぎます。
  initial-delay-seconds: 60

  # Automatic fetch interval. MOFA data is generally updated about every 5 minutes.

  # 自動取得の間隔です。外務省データは概ね5分間隔で更新されます。
  poll-interval-minutes: 5

  # URL of the MOFA lightweight "new arrivals" XML. Usually no need to change.

  # 外務省「新着情報」軽量XMLのURLです。通常は変更不要です。
  url: "https://www.ezairyu.mofa.go.jp/opendata/area/newarrivalL.xml"

  # Timeout in seconds for external network requests.

  # 外部通信のタイムアウト秒数です。
  timeout-seconds: 15

  # Prevents broadcasting all old items already present in the XML on first startup.
  # If true, first-fetch items are only marked as seen; only later new items are notified.

  # 初回起動時に、既にXML内に存在する古いニュースを一気に流さないようにします。
  # true の場合、初回取得分は既読登録のみ行い、次回以降の新着だけ通知します。
  suppress-initial-broadcast: true

  # Maximum number of items to broadcast per fetch.

  # 1回の取得でチャットに流す最大件数です。
  max-broadcast-per-poll: 5

  # Maximum number of delivered item IDs to keep.
  # Prevents plugins/NewsFlash/mofa-seen.txt from growing without limit.

  # 配信済みIDを保持する最大件数です。
  # plugins/NewsFlash/mofa-seen.txt が無制限に増えるのを防ぎます。
  seen-history-limit: 1000

  filter:
    # Enables the keyword filter for MOFA Overseas Safety items.
    # This does not apply to P2PQuake data.
    # If true, only news matching the keywords below is notified.
    # If false, all MOFA news items are notified.

    # 外務省 海外安全情報向けの通知キーワードフィルタを有効にします。
    # P2P地震情報には適用されません。
    # true の場合、下の keywords に一致したニュースだけ通知します。
    # false の場合、外務省ニュースを全件通知します。
    enabled: true

    # Keywords to notify.
    # Matching target is title + lead + type.

    # 通知対象にするキーワードです。
    # 判定対象は title + lead + type です。
    keywords:
      - "ミサイル"
      - "攻撃"
      - "空爆"
      - "戦闘"
      - "爆発"
      - "感染"
      - "アウトブレイク"
      - "暗殺"
      - "地震"
      - "津波"
      - "戦争"

p2pquake:
  # Japan-focused data source.
  # Handles Japan domestic earthquake, tsunami, and EEW information derived from JMA data.
  # Seismic intensity and prefecture filtering are Japan-specific concepts.
  # Enables P2PQuake WebSocket API reception.

  # 日本固有寄りの情報ソースです。
  # 気象庁由来の日本国内向け地震・津波・緊急地震速報を扱います。
  # 震度表記や都道府県フィルターも日本向けの概念です。
  # P2P地震情報 WebSocket API の取得を有効にします。
  enabled: true

  # Real-time P2PQuake WebSocket URL. Usually no need to change.

  # P2P地震情報のリアルタイム配信URLです。通常は変更不要です。
  websocket-url: "wss://api.p2pquake.net/v2/ws"

  # Seconds to wait before reconnecting after WebSocket disconnection.

  # WebSocket切断時に再接続まで待つ秒数です。
  reconnect-delay-seconds: 10

  # Maximum number of received IDs to keep for duplicate prevention.

  # 重複配信を防ぐため、受信済みIDを保持する最大件数です。
  seen-history-limit: 1000

  earthquake:
    # Broadcasts JMA earthquake information to chat.

    # 気象庁の地震情報をチャットへ通知します。
    enabled: true

    # Minimum seismic intensity to notify.
    # 40=Intensity 4, 45=5 lower, 50=5 upper, 55=6 lower, 60=6 upper, 70=7

    # 通知する最小震度です。
    # 40=震度4, 45=震度5弱, 50=震度5強, 55=震度6弱, 60=震度6強, 70=震度7
    min-scale: 40

    # Use this to limit notifications to specific prefectures.
    # If enabled is false, all of Japan is targeted.

    # 通知対象を特定の都道府県に絞る場合に使います。
    # enabled: false の場合は全国を対象にします。
    target-prefectures:
      enabled: false
      list:
        # - "東京都"
        # - "神奈川県"

    # Whether to notify earthquake information whose maximum intensity is unknown.

    # 最大震度不明の地震情報も通知するかどうかです。
    include-unknown-scale: false

  tsunami:
    # Broadcasts tsunami advisories, warnings, and major warnings to chat.

    # 津波注意報・津波警報・大津波警報をチャットへ通知します。
    enabled: true

  eew:
    # Broadcasts Emergency Earthquake Warnings to chat.

    # 緊急地震速報（警報）をチャットへ通知します。
    enabled: true

    # Whether to notify test messages.

    # テスト配信も通知するかどうかです。
    include-tests: false

rss:
  # General-purpose data source.
  # Not Japan-specific. You can configure any RSS/Atom URL.
  # Fetches custom RSS/Atom feeds.
  # Disabled by default because each source has its own terms of use.

  # 汎用の情報ソースです。
  # 日本固有ではありません。任意のRSS/Atom URLを設定できます。
  # 任意のRSS/Atomフィードを取得します。
  # 配信元ごとに利用規約が異なるため、デフォルトでは無効です。
  enabled: false

  # Seconds to wait after server startup before the first automatic fetch.

  # サーバー起動後、初回の自動取得まで待つ秒数です。
  initial-delay-seconds: 60

  # RSS/Atom feed fetch interval.

  # RSS/Atomフィードの取得間隔です。
  poll-interval-minutes: 10

  # Timeout in seconds for external network requests.

  # 外部通信のタイムアウト秒数です。
  timeout-seconds: 15

  # Maximum number of items to broadcast per fetch.

  # 1回の取得でチャットに流す最大件数です。
  max-broadcast-per-poll: 5

  # Maximum number of delivered item IDs to keep.
  # Prevents plugins/NewsFlash/rss-seen.txt from growing without limit.

  # 配信済みIDを保持する最大件数です。
  # plugins/NewsFlash/rss-seen.txt が無制限に増えるのを防ぎます。
  seen-history-limit: 1000

  feeds:
    # List of RSS/Atom feeds.
    # Set URLs yourself after checking each source's terms of use.
    #
    # id:
    #   ID used to identify the feed. Letters, numbers, hyphens, and underscores are recommended.
    #   Avoid changing it after operation starts because it is also used for seen-item tracking.
    #
    # name:
    #   Source name displayed in chat.
    #
    # url:
    #   RSS or Atom feed URL.
    #
    # enabled:
    #   Whether to fetch this feed.
    #
    # filter.enabled:
    #   If false, all new articles are notified.
    #   If true, only articles matching keywords are notified.
    #
    # keywords:
    #   Keywords used when filter.enabled is true.
    #   Matching target is title + description/summary.
    #
    # - id: "example"
    #   name: "Example News"
    #   url: "https://example.com/rss.xml"
    #   enabled: true
    #   filter:
    #     enabled: false
    #     keywords:
    #       - "earthquake"
    #       - "warning"
    #
    # RSS/Atomフィードの一覧です。
    # 配信元の利用規約を確認したうえで、各自でURLを設定してください。
    #
    # id:
    #   フィードを識別するためのIDです。英数字・ハイフン・アンダースコア推奨です。
    #   既読管理にも使われるため、運用開始後はなるべく変更しないでください。
    #
    # name:
    #   チャットに表示する配信元名です。
    #
    # url:
    #   RSSまたはAtomフィードのURLです。
    #
    # enabled:
    #   このフィードを取得するかどうかです。
    #
    # filter.enabled:
    #   false の場合は新着記事を全件通知します。
    #   true の場合は keywords に一致した記事だけ通知します。
    #
    # keywords:
    #   filter.enabled が true の場合に使う通知対象キーワードです。
    #   判定対象は title + description/summary です。
    #
    # - id: "example"
    #   name: "Example News"
    #   url: "https://example.com/rss.xml"
    #   enabled: true
    #   filter:
    #     enabled: false
    #     keywords:
    #       - "地震"
    #       - "警報"

broadcast:
  # Prefix displayed at the beginning of chat messages. MiniMessage format is supported.

  # チャット先頭に表示する接頭辞です。MiniMessage形式が使えます。
  prefix: "<red><bold>[NewsFlash]</bold></red>"

  # Message format broadcast to chat. MiniMessage format is supported.
  # Available placeholders: {prefix}, {source}, {type}, {title}, {lead}, {keyword}, {date}, {url}

  # チャットに流す本文フォーマットです。MiniMessage形式が使えます。
  # 使用可能な置換: {prefix}, {source}, {type}, {title}, {lead}, {keyword}, {date}, {url}
  format: "{prefix} <gold>{source}</gold> <yellow>{title}</yellow> <gray>({date})</gray> <aqua><click:open_url:'{url}'>{url}</click></aqua>"

  # Also outputs broadcast details to the server console.

  # 通知内容をサーバーコンソールにも出力します。
  console: true

  chat:
    # Sends notifications to normal server chat.

    # 通常のサーバーチャットへ通知します。
    enabled: true

  actionbar:
    # Shows notifications in the action bar.
    # Disabled by default because action bars are also used by other plugins.
    # MiniMessage format is supported.
    # Available placeholders: {prefix}, {source}, {type}, {title}, {lead}, {keyword}, {date}, {url}, {ticker}

    # アクションバーにも通知を表示します。
    # 他プラグインも使う領域のため、デフォルトでは無効です。
    # MiniMessage形式が使えます。
    # 使用可能な置換: {prefix}, {source}, {type}, {title}, {lead}, {keyword}, {date}, {url}, {ticker}
    enabled: false
    format: "{prefix} <yellow>{ticker}</yellow>"

  bossbar:
    # Shows notifications in the boss bar.
    # Disabled by default because boss bars are visually prominent.
    # MiniMessage format is supported.
    # Available placeholders: {prefix}, {source}, {type}, {title}, {lead}, {keyword}, {date}, {url}, {ticker}
    # color: PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE
    # overlay: PROGRESS, NOTCHED_6, NOTCHED_10, NOTCHED_12, NOTCHED_20
    # progress: 0.0 to 1.0

    # ボスバーにも通知を表示します。
    # 目立つ表示のため、デフォルトでは無効です。
    # MiniMessage形式が使えます。
    # 使用可能な置換: {prefix}, {source}, {type}, {title}, {lead}, {keyword}, {date}, {url}, {ticker}
    # color: PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE
    # overlay: PROGRESS, NOTCHED_6, NOTCHED_10, NOTCHED_12, NOTCHED_20
    # progress: 0.0 から 1.0
    enabled: false
    format: "{prefix} <yellow>{ticker}</yellow>"
    color: "YELLOW"
    overlay: "PROGRESS"
    progress: 1.0

  ticker:
    # Shared scrolling ticker settings for actionbar and bossbar.
    # width is the visible character count.
    # interval-ticks is the scroll speed. 20 ticks = 1 second.
    # duration-seconds is how long each notification remains visible.

    # アクションバーとボスバーで共通の横スクロール設定です。
    # width は表示される文字数です。
    # interval-ticks はスクロール速度です。20 ticks = 1秒です。
    # duration-seconds は1件の通知を表示し続ける秒数です。
    width: 48
    interval-ticks: 4
    duration-seconds: 18
    separator: "   "
