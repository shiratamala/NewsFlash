name: NewsFlashJP
version: ${project.version}
main: dev.newsflash.NewsFlashPlugin
api-version: '1.20'
author: rarala
description: Japan-focused safety alerts for Minecraft server chat.
commands:
  newsflash:
    description: Manage NewsFlashJP.
    usage: /newsflash <reload|check|status> [mofa|p2pquake|rss]
    permission: newsflash.admin
permissions:
  newsflash.admin:
    description: Allows managing NewsFlashJP.
    default: op
