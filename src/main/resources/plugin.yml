name: NewsFlash
version: ${project.version}
main: dev.newsflash.NewsFlashPlugin
api-version: '1.20'
author: rarala
description: Real-time safety alerts for Minecraft server chat.
commands:
  newsflash:
    description: Manage NewsFlash.
    usage: /newsflash <reload|check|status|language> [mofa|p2pquake|rss]
permissions:
  newsflash.admin:
    description: Allows managing NewsFlash.
    default: op
